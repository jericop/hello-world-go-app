version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/hello-world
    binary: hello-world
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

homebrew_casks:
  - name: hello-world
    ids:
      - default
    repository:
      owner: jericop
      name: homebrew-hello-world-go-app
      token: "{{ .Env.HOMEBREW_REPO_GH_TOKEN }}"
    skip_upload: auto
    homepage: "https://github.com/jericop/hello-world-go-app"
    description: "A simple Go command-line tool that prints hello world"
    binaries:
      - hello-world

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: jericop
    name: hello-world-go-app
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
